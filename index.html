<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>explicode-demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="ghmd.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <style>
    /* Closed sidebar must never intercept touches on mobile */
    @media screen and (max-width: 599px) {
      body.close .sidebar { pointer-events: none !important; }
    }
    /* Active sub-heading: blue text only, no background, no row highlight */
    .app-sub-sidebar li.active > a {
      color: #58a6ff !important;
      background: none !important;
    }
    /* Toggle button: small right margin so it doesn't overlap the scroll edge */
    .xp-sub-toggle {
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    var githubBase = 'https://github.com/benatfroemming/explicode-demo/blob/main';
    var repoUrl = githubBase ? githubBase.replace(/\/blob\/[^\/]+$/, '') : '';

    var explicodePlugin = function(hook) {
      var closedFolders = new Set();
      var seenFolders = new Set();
      var TRANSITION = '280ms cubic-bezier(0.4,0,0.2,1)';
      var currentFilePath = 'README.md';

      var sidebar, toggle, mobileBtn, drag;
      var sidebarOpen = true;

      function isMobile() { return window.innerWidth < 600; }

      function syncPositions(w, animate) {
        var content = document.querySelector('.content');
        var dur = animate ? TRANSITION : 'none';
        sidebar.style.transition = 'transform ' + dur + ', width ' + dur;
        if (content) { content.style.transition = 'left ' + dur; content.style.left = w + 'px'; }
        drag.style.transition = 'left ' + dur;
        drag.style.left = w + 'px';
        toggle.style.transition = 'left ' + dur;
        toggle.style.left = (w - 1) + 'px';
      }

      function setOpen(open, animate) {
        sidebarOpen = open;
        var mobile = isMobile();
        var dur = animate ? TRANSITION : 'none';
        var content = document.querySelector('.content');

        if (open) {
          document.body.classList.remove('close');
          toggle.innerHTML = '&#x2039;';
          if (mobile) {
            sidebar.style.transition = 'transform ' + dur;
            sidebar.style.transform = 'translateX(0)';
            sidebar.style.pointerEvents = '';
            if (content) content.style.left = '';
          } else {
            var w = parseInt(sidebar.style.width) || sidebar.offsetWidth || 270;
            drag.style.transition = animate ? 'left ' + TRANSITION + ', opacity ' + TRANSITION : 'none';
            drag.style.left = w + 'px';
            drag.style.opacity = '1';
            drag.style.pointerEvents = '';
            syncPositions(w, animate);
          }
        } else {
          document.body.classList.add('close');
          toggle.innerHTML = '&#x203a;';
          if (mobile) {
            sidebar.style.transition = 'transform ' + dur;
            sidebar.style.transform = 'translateX(-100%)';
            sidebar.style.pointerEvents = 'none';
            if (content) content.style.left = '';
          } else {
            sidebar.style.transition = 'transform ' + dur;
            toggle.style.transition = 'left ' + dur;
            toggle.style.left = '0px';
            if (content) { content.style.transition = 'left ' + dur; content.style.left = '0'; }
            drag.style.transition = animate ? 'left ' + TRANSITION + ', opacity ' + TRANSITION : 'none';
            drag.style.left = '0px';
            drag.style.opacity = '0';
            drag.style.pointerEvents = 'none';
          }
        }
      }

      hook.beforeEach(function(content, next) {
        var hash = window.location.hash.replace(/^#\/?/, '').replace(/\?.*$/, '');
        if (!hash) {
          currentFilePath = 'README.md';
        } else {
          if (hash.endsWith('.md')) {
            var withoutMd = hash.slice(0, -3);
            var dotIdx = withoutMd.lastIndexOf('.');
            var ext = dotIdx !== -1 ? withoutMd.slice(dotIdx + 1).toLowerCase() : '';
            currentFilePath = (ext && ext !== 'md') ? withoutMd : hash;
          } else {
            currentFilePath = hash;
          }
        }
        next(content);
      });

      hook.mounted(function() {
        var builtIn = document.querySelector('.sidebar-toggle');
        if (builtIn) builtIn.style.display = 'none';

        sidebar = document.querySelector('.sidebar');
        sidebar.style.overflow = 'hidden';
        sidebar.style.display = 'flex';
        sidebar.style.flexDirection = 'column';
        sidebar.style.padding = '0';

        var scrollWrap = document.createElement('div');
        scrollWrap.className = 'xp-sidebar-scroll';
        Array.from(sidebar.childNodes).forEach(function(n) {
          if (n.nodeName !== 'H1') scrollWrap.appendChild(n);
        });
        sidebar.appendChild(scrollWrap);

        var footer = document.createElement('div');
        footer.className = 'xp-sidebar-footer';
        var wmSpan = document.createElement('span');
        wmSpan.innerHTML = 'Made with <a href="https://explicode.com" target="_blank"><strong>Explicode</strong></a>';
        footer.appendChild(wmSpan);
        sidebar.appendChild(footer);

        toggle = document.createElement('button');
        toggle.id = 'xp-toggle';
        toggle.setAttribute('aria-label', 'Toggle sidebar');
        toggle.innerHTML = '&#x2039;';
        document.body.appendChild(toggle);

        mobileBtn = document.createElement('button');
        mobileBtn.id = 'xp-mobile-btn';
        mobileBtn.setAttribute('aria-label', 'Open sidebar');
        mobileBtn.innerHTML =
          '<span class="xp-mb-bars"><span></span><span></span><span></span></span>';
        document.body.appendChild(mobileBtn);

        var closeBtn = document.createElement('button');
        closeBtn.id = 'xp-sidebar-close';
        closeBtn.setAttribute('aria-label', 'Close sidebar');
        closeBtn.innerHTML = '&#x2715;';
        var h1 = sidebar.querySelector('h1');
        if (h1) {
          h1.insertBefore(closeBtn, h1.firstChild);
        } else {
          sidebar.insertBefore(closeBtn, sidebar.firstChild);
        }

        closeBtn.addEventListener('click', function() {
          setOpen(false, true);
        });

        drag = document.createElement('div');
        drag.className = 'xp-drag';
        document.body.appendChild(drag);

        toggle.addEventListener('click', function() {
          setOpen(!sidebarOpen, true);
        });
        mobileBtn.addEventListener('click', function() {
          setOpen(!sidebarOpen, true);
        });

        // Single delegated listener for nav link taps/clicks closing the sidebar on mobile.
        sidebar.addEventListener('click', function(e) {
          if (!isMobile()) return;
          var a = e.target.closest('a');
          if (a && sidebar.contains(a) && !a.closest('.xp-sidebar-footer')) {
            setOpen(false, true);
          }
        });

        // Resize handler
        var lastMobile = isMobile();
        window.addEventListener('resize', function() {
          var nowMobile = isMobile();
          var w = parseInt(sidebar.style.width) || sidebar.offsetWidth || 270;
          if (nowMobile !== lastMobile) {
            lastMobile = nowMobile;
            if (nowMobile) {
              var content = document.querySelector('.content');
              if (content) content.style.left = '';
              sidebar.style.transition = 'none';
              sidebar.style.transform = sidebarOpen ? 'translateX(0)' : 'translateX(-100%)';
              sidebar.style.pointerEvents = sidebarOpen ? '' : 'none';
            } else {
              sidebar.style.transform = '';
              sidebar.style.pointerEvents = '';
              if (sidebarOpen) {
                syncPositions(w, false);
              } else {
                var content = document.querySelector('.content');
                if (content) content.style.left = '0';
                toggle.style.left = '0px';
              }
            }
          } else if (!nowMobile && sidebarOpen) {
            syncPositions(w, false);
          }
          drag.style.transition = 'none';
          if (isMobile()) {
            drag.style.opacity = '0';
            drag.style.pointerEvents = 'none';
          } else if (sidebarOpen) {
            drag.style.opacity = '1';
            drag.style.pointerEvents = '';
          } else {
            drag.style.left = '0px';
            drag.style.opacity = '0';
            drag.style.pointerEvents = 'none';
          }
        });

        // Initial state
        if (isMobile()) {
          lastMobile = true;
          sidebarOpen = false;
          sidebar.style.transition = 'none';
          sidebar.style.transform = 'translateX(-100%)';
          sidebar.style.pointerEvents = 'none';
          document.body.classList.add('close');
          var content = document.querySelector('.content');
          if (content) content.style.left = '';
          drag.style.transition = 'none';
          drag.style.opacity = '0';
          drag.style.pointerEvents = 'none';
        } else {
          sidebarOpen = true;
          syncPositions(parseInt(sidebar.style.width) || sidebar.offsetWidth || 270, false);
          drag.style.transition = 'none';
          drag.style.opacity = '1';
          drag.style.pointerEvents = '';
        }

        // Drag to resize (desktop only)
        drag.addEventListener('mousedown', function(e) {
          e.preventDefault();
          var startX = e.clientX;
          var startW = parseInt(sidebar.style.width) || sidebar.offsetWidth || 270;
          document.body.style.userSelect = 'none';
          document.body.style.cursor = 'col-resize';
          sidebar.style.transition = 'none';
          toggle.style.transition = 'none';
          var content = document.querySelector('.content');
          if (content) content.style.transition = 'none';
          drag.style.transition = 'none';

          function onMove(e) {
            var w = Math.max(180, Math.min(600, startW + e.clientX - startX));
            sidebar.style.width = w + 'px';
            var content = document.querySelector('.content');
            if (content) content.style.left = w + 'px';
            drag.style.left = w + 'px';
            toggle.style.left = (w - 1) + 'px';
          }
          function onUp() {
            document.body.style.userSelect = '';
            document.body.style.cursor = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });

      hook.doneEach(function() {
        Prism.highlightAll();
      });

      hook.doneEach(function() {
        var sb = document.querySelector('.sidebar');

        if (repoUrl) {
          var h1 = sb.querySelector('h1');
          if (h1) {
            var titleA = h1.querySelector('a');
            if (titleA) titleA.target = '_blank';
          }
        }

        // Ensure scroll wrapper exists
        if (!sb.querySelector('.xp-sidebar-scroll')) {
          var scrollWrap = document.createElement('div');
          scrollWrap.className = 'xp-sidebar-scroll';
          var footer = sb.querySelector('.xp-sidebar-footer');
          Array.from(sb.childNodes).forEach(function(n) {
            if (!n.classList || !n.classList.contains('xp-sidebar-footer')) {
              scrollWrap.appendChild(n);
            }
          });
          sb.insertBefore(scrollWrap, footer || null);
        }

        // Re-sync desktop drag/toggle positions
        if (!isMobile() && drag && toggle) {
          var w = parseInt(sb.style.width) || sb.offsetWidth || 270;
          drag.style.transition = 'none';
          drag.style.left = sidebarOpen ? w + 'px' : '0px';
          drag.style.opacity = sidebarOpen ? '1' : '0';
          drag.style.pointerEvents = sidebarOpen ? '' : 'none';
          toggle.style.left = sidebarOpen ? (w - 1) + 'px' : '0px';
        }

        // GitHub source button
        (function() {
          var existing = document.getElementById('xp-gh-page-btn');
          if (existing) existing.remove();
          if (!githubBase || !currentFilePath) return;
          var btn = document.createElement('a');
          btn.id = 'xp-gh-page-btn';
          btn.href = githubBase + '/' + currentFilePath;
          btn.target = '_blank';
          btn.rel = 'noopener noreferrer';
          btn.setAttribute('aria-label', 'View on GitHub');
          btn.title = 'View on GitHub';
          btn.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>';
          document.body.insertBefore(btn, mobileBtn || null);
        })();

        var nav = sb.querySelector('.sidebar-nav');
        if (!nav) return;

        // Reset Docsify collapse state
        nav.querySelectorAll('li').forEach(function(li) {
          li.classList.remove('collapse');
        });
        nav.querySelectorAll('li > ul').forEach(function(ul) {
          ul.style.display = '';
        });

        // Folder buttons
        nav.querySelectorAll('li').forEach(function(li) {
          if (li.dataset.xpFolder) return;
          var labelEl = li.querySelector(':scope > p > strong') || li.querySelector(':scope > strong');
          if (!labelEl) return;
          var subUl = li.querySelector(':scope > ul');
          if (!subUl) return;

          var folderName = labelEl.textContent.trim();
          li.dataset.xpFolder = '1';
          subUl.setAttribute('data-xp-folder-ul', '1');

          var folderBtn = document.createElement('button');
          folderBtn.className = 'xp-folder-btn';
          var iconSpan = document.createElement('span');
          var labelSpan = document.createElement('span');
          labelSpan.className = 'xp-folder-label';
          labelSpan.textContent = folderName;
          folderBtn.appendChild(iconSpan);
          folderBtn.appendChild(labelSpan);

          var wrapper = labelEl.closest('p') || labelEl;
          li.insertBefore(folderBtn, wrapper);
          wrapper.remove();

          if (!seenFolders.has(folderName)) {
            seenFolders.add(folderName);
            closedFolders.add(folderName);
          }
          var folderOpen = !closedFolders.has(folderName);
          folderBtn.setAttribute('data-open', folderOpen ? 'true' : 'false');
          iconSpan.className = 'xp-folder-icon ' + (folderOpen ? 'xp-folder-open' : 'xp-folder-closed');
          subUl.style.display = folderOpen ? '' : 'none';

          folderBtn.addEventListener('click', function() {
            var nowOpen = folderBtn.getAttribute('data-open') !== 'true';
            folderBtn.setAttribute('data-open', nowOpen ? 'true' : 'false');
            iconSpan.className = 'xp-folder-icon ' + (nowOpen ? 'xp-folder-open' : 'xp-folder-closed');
            subUl.style.display = nowOpen ? '' : 'none';
            if (nowOpen) closedFolders.delete(folderName);
            else closedFolders.add(folderName);
          });
        });

        // Auto-expand folder containing the active link
        var activeLink = nav.querySelector('li.active > a');
        if (activeLink) {
          var parentUl = activeLink.closest('[data-xp-folder-ul]');
          while (parentUl) {
            var folderBtn = parentUl.previousElementSibling;
            if (folderBtn && folderBtn.classList.contains('xp-folder-btn')) {
              folderBtn.setAttribute('data-open', 'true');
              folderBtn.querySelector('.xp-folder-icon').className = 'xp-folder-icon xp-folder-open';
              parentUl.style.display = '';
              closedFolders.delete(folderBtn.querySelector('.xp-folder-label').textContent.trim());
            }
            parentUl = parentUl.parentElement ? parentUl.parentElement.closest('[data-xp-folder-ul]') : null;
          }
        }

        // File icons
        nav.querySelectorAll('a').forEach(function(a) {
          if (a.dataset.xpIcon) return;
          if (a.closest('.app-sub-sidebar')) return;
          a.dataset.xpIcon = '1';
          var icon = document.createElement('span');
          icon.className = 'xp-item-icon xp-file-icon';
          a.insertBefore(icon, a.firstChild);
        });

        // ── Flatten .app-sub-sidebar & add '#' prefix ────────────────────────
        //
        // Docsify's DOM structure for a file li with subMaxLevel=3:
        //
        //   <li>                              ← file li
        //     <a href="...">file.md</a>
        //     <ul class="app-sub-sidebar">   ← sub root (this IS a UL itself)
        //       <li><a>H2 heading</a></li>   ← direct child, depth=0
        //       <li>
        //         <a>H2 with children</a>
        //         <ul>
        //           <li><a>H3 heading</a></li>  ← nested, depth=1
        //         </ul>
        //       </li>
        //     </ul>
        //   </li>
        //
        // THE BUG that caused the first heading to disappear:
        //   querySelectorAll('li') returns ALL lis including direct children.
        //   appendChild() on a node that is ALREADY a direct child of sub moves
        //   it to the END of sub — reordering the list and making the first
        //   heading appear last (effectively "missing" since it scrolled out of view
        //   or was treated as a deeper item).
        //
        // FIX: only move lis that are NOT already direct children of sub.
        //   Direct children are already in correct order — leave them alone.
        //   Only pull up grandchildren (nested lis) to the top level.
        //   We still do two passes: measure depth first, then move.

        nav.querySelectorAll('.app-sub-sidebar').forEach(function(sub) {
          // Guard: already processed if first direct-child li has xpProcessed.
          var firstDirectLi = sub.querySelector(':scope > li');
          if (firstDirectLi && firstDirectLi.dataset.xpProcessed) return;

          // Collect ALL lis in document order (so we can read their depth).
          var allLis = Array.from(sub.querySelectorAll('li'));

          // Pass 1: record depth while nesting is intact.
          // depth = number of UL ancestors between li and sub (exclusive).
          // Direct child li → 0 (its parent UL is sub itself, not counted).
          allLis.forEach(function(li) {
            li.dataset.xpProcessed = '1';
            var depth = 0;
            var el = li.parentElement;
            while (el && el !== sub) {
              if (el.tagName === 'UL') depth++;
              el = el.parentElement;
            }
            // depth 0 = direct child of sub (H2), depth 1 = H3, etc.
            li.dataset.xpHeadingDepth = depth;
          });

          // Pass 2: move only NON-direct-child lis up to sub root.
          // Direct children (depth=0) are already correct — do not touch them
          // (appendChild on an existing child reorders it to the end).
          allLis.forEach(function(li) {
            if (parseInt(li.dataset.xpHeadingDepth) > 0) {
              // Find insertion point: insert after the previous sibling li
              // that was the parent's li in document order.
              // Simplest correct approach: just append — they'll go after all
              // current direct children. Since allLis is in document order,
              // they end up in the right sequence relative to each other.
              sub.appendChild(li);
            }
          });

          // Remove now-empty nested ULs.
          sub.querySelectorAll('ul').forEach(function(ul) { ul.remove(); });
        });

        // Add '#' prefix to every sub-heading anchor (once per anchor).
        nav.querySelectorAll('.app-sub-sidebar a').forEach(function(a) {
          if (a.dataset.xpSubIcon) return;
          a.dataset.xpSubIcon = '1';
          var prefix = document.createElement('span');
          prefix.className = 'xp-heading-depth';
          prefix.textContent = '#';
          a.insertBefore(prefix, a.firstChild);
        });

        // ── Sub-heading toggle ───────────────────────────────────────────────
        //
        // Created once per file li (xpToggle guard), always starts CLOSED.
        //
        // STALE CLOSURE FIX: do NOT capture subSidebar in the closure at
        // creation time. Docsify may inject a new .app-sub-sidebar node into
        // the same li on re-render (though in practice it reuses the node,
        // the safe approach is to query it live on every click).
        //
        // DROPDOWN STOPS WORKING FIX: the previous code set xpToggle on the li
        // but then re-ran `subSidebar.style.display = 'none'` on every doneEach
        // via the `if (!li.dataset.xpToggle)` branch — except it didn't, because
        // the guard prevented re-entry. The actual cause was that the toggle button
        // was appended INSIDE the li, which is also where .app-sub-sidebar lives.
        // When Docsify re-renders and injects a fresh .app-sub-sidebar, it appends
        // it as the last child of the li — AFTER our toggle button. The button's
        // z-index / pointer-events were then covered by the sub-sidebar ul.
        // FIX: always append the toggle button LAST (after any sub-sidebar).

        nav.querySelectorAll('li').forEach(function(li) {
          // Only process file-level lis that have a sub-sidebar and are not
          // themselves inside a sub-sidebar.
          if (li.closest('.app-sub-sidebar')) return;
          var sub = li.querySelector(':scope > .app-sub-sidebar');
          if (!sub) return;

          if (!li.dataset.xpToggle) {
            li.dataset.xpToggle = '1';
            li.style.position = 'relative';
            sub.style.display = 'none';

            var toggleBtn = document.createElement('button');
            toggleBtn.className = 'xp-sub-toggle';
            toggleBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3.5l3 3 3-3"/></svg>';

            toggleBtn.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              // Always query live — never use a stale closure reference.
              var liveSub = li.querySelector(':scope > .app-sub-sidebar');
              if (!liveSub) return;
              var isOpen = liveSub.style.display !== 'none';
              liveSub.style.display = isOpen ? 'none' : '';
              toggleBtn.classList.toggle('xp-sub-toggle-open', !isOpen);
            });

            // Append LAST so it sits on top of everything in the li.
            li.appendChild(toggleBtn);
          } else {
            // On re-renders: ensure the toggle button is still the last child
            // (Docsify may have appended a fresh sub-sidebar after it).
            var existingBtn = li.querySelector(':scope > .xp-sub-toggle');
            if (existingBtn && existingBtn !== li.lastElementChild) {
              li.appendChild(existingBtn);
            }
          }
        });

        // ── Keep file li always active; heading = blue text only ─────────────
        //
        // The problem: Docsify's router, on any hash change (including heading
        // anchor clicks), calls doneEach. By that point it has already toggled
        // .active — adding it to the heading li, removing it from the file li.
        //
        // Strategy:
        // 1. Find the file li for the current page by matching href to URL path.
        //    This works even when Docsify has stripped .active from it.
        // 2. Force .active onto it unconditionally.
        // 3. Strip .active from all sub-heading lis (CSS gives active ones blue text).
        // 4. Re-add .active to the sub-heading li matching the current ?id= fragment
        //    so the blue text indicator shows the right heading.

        var rawHash = window.location.hash; // e.g. '#/path/to/file?id=heading-slug'
        // File path part: strip leading #/ and any ?id= query.
        var urlFilePath = rawHash.replace(/^#\/?/, '').replace(/\?.*$/, '');
        // Heading fragment: the ?id= value.
        var urlFragment = (rawHash.match(/[?&]id=([^&]*)/) || [])[1] || '';

        // Find the file li whose anchor href matches urlFilePath.
        var currentFileLi = null;
        nav.querySelectorAll('a').forEach(function(a) {
          if (currentFileLi) return;
          if (a.closest('.app-sub-sidebar')) return;
          var href = a.getAttribute('href') || '';
          var hrefPath = href.replace(/^#\/?/, '').replace(/\?.*$/, '');
          // Match exactly, or match README when path is empty.
          if (hrefPath === urlFilePath || (!urlFilePath && (hrefPath === 'README' || hrefPath === 'README.md' || hrefPath === ''))) {
            currentFileLi = a.closest('li');
          }
        });

        // Fallback: if no href match, grab whatever li still has .active
        // and is not inside a sub-sidebar.
        if (!currentFileLi) {
          nav.querySelectorAll('li.active').forEach(function(li) {
            if (!currentFileLi && !li.closest('.app-sub-sidebar')) {
              currentFileLi = li;
            }
          });
        }

        if (currentFileLi) {
          // Force the file li active.
          currentFileLi.classList.add('active');

          // Strip active from all sub-heading lis.
          currentFileLi.querySelectorAll('.app-sub-sidebar li').forEach(function(sli) {
            sli.classList.remove('active');
          });

          // Re-apply active to the heading matching the URL fragment (blue text).
          if (urlFragment) {
            currentFileLi.querySelectorAll('.app-sub-sidebar a').forEach(function(a) {
              var href = a.getAttribute('href') || '';
              var hrefId = (href.match(/[?&]id=([^&]*)/) || [])[1] || '';
              if (hrefId === urlFragment) {
                a.closest('li').classList.add('active');
              }
            });
          }
        }

        // Unrendered file GitHub links
        if (githubBase) {
          nav.querySelectorAll('span.xp-unrendered[data-path]').forEach(function(span) {
            if (span.dataset.xpGh) return;
            span.dataset.xpGh = '1';
            span.addEventListener('click', function() {
              window.open(githubBase + '/' + span.dataset.path, '_blank', 'noopener noreferrer');
            });
          });
        }
      });
    };

    var titleLockPlugin = function(hook) {
      hook.doneEach(function() { document.title = 'explicode-demo'; });
    };

    window.$docsify = {
      name: 'explicode-demo',
      nameLink: repoUrl || '/',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      plugins: [explicodePlugin, titleLockPlugin],
      markdown: {
        renderer: {
          code(code, lang) {
            const isSource = lang?.includes('xp-source');
            const realLang = lang?.replace('xp-source', '').trim() || '';
            const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const attrs = realLang ? ` data-lang="${realLang}"` : '';
            const cls = isSource ? ' class="xp-source-block"' : '';
            return `<pre${attrs}${cls}><code class="language-${realLang}">${escaped}</code></pre>`;
          }
        }
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1/components/';</script>
  <script src="https://cdn.jsdelivr.net/npm/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@1/dist/docsify-katex.js"></script>
</body>
